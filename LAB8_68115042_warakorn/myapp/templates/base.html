<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}
    <title>Django Apps</title>
    {% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: #0b0b1a;
            color: #e2e8f0;
        }

        .navbar-custom {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: .9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(11, 11, 26, .85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.18);
        }

        .navbar-custom .nav-brand {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-weight: 700;
            font-size: 1rem;
            color: #e2e8f0;
            text-decoration: none;
        }

        .navbar-custom .nav-brand i {
            color: #818cf8;
        }

        .navbar-custom .nav-links {
            display: flex;
            gap: .5rem;
        }

        .navbar-custom .nav-link {
            padding: .45rem 1rem;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: .875rem;
            font-weight: 500;
            transition: all .25s;
        }

        .navbar-custom .nav-link:hover {
            background: rgba(99, 102, 241, .15);
            color: #818cf8;
        }

        .navbar-custom .nav-link i {
            margin-right: .3rem;
        }
    </style>
</head>

<body>
    <nav class="navbar-custom">
        <a href="/" class="nav-brand"><i class="fas fa-crow"></i> Lab8</a>
        <div class="nav-links">
            <a href="/form/" class="nav-link"><i class="fas fa-user-plus"></i>บันทึกข้อมูล</a>
            <a href="/employees/" class="nav-link"><i class="fas fa-users"></i>รายชื่อ</a>
            <a href="/contact/" class="nav-link"><i class="fas fa-headset"></i>ติดต่อ</a>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center text-muted">
            <p class="mb-0">&copy; 2026 ICT12367 &mdash; Frameworks for Security Web Application Development</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
